<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kitty's Coffee</title>
</head>
<body>


<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #f7e7ce, #d8c3a5);
        overflow: hidden;
    }

    .container {
        width: 100%;
        position: relative;
        height: 120px;
    }

    .botao-jazz {
        position: absolute;
        left: 0;
        padding: 16px 32px;
        border: none;
        border-radius: 40px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        cursor: pointer;
        background: #c97b63;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        animation: jazzLofi 5s ease-in-out infinite;
    }

    .botao-jazz:hover {
        transform: scale(1.05);
    }

    @keyframes jazzLofi {
        0% {
            left: 5%;
            background-color: #c97b63;
        }

        25% {
            background-color: #8b5e3c;
        }

        50% {
            left: 75%;
            background-color: #5c3d2e;
        }

        75% {
            background-color: #a67c52;
        }

        100% {
            left: 5%;
            background-color: #c97b63;
        }
    }
</style>
</head>

<body>

    <div class="container">
        <button class="botao-jazz">
            ☕ Conheça nossos gatinhos
        </button>
    </div>

</body>
</html>
    
</body>
</html>
